name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          choco install 7zip -y
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Compile package
        run: python -m compileall dew_encryption
      - name: Parse installer scripts
        shell: pwsh
        run: |
          $err = $null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content .\installer\install.ps1 -Raw), [ref]$err) | Out-Null
          if ($err) { throw $err }
          [System.Management.Automation.PSParser]::Tokenize((Get-Content .\installer\install-context-menu.ps1 -Raw), [ref]$err) | Out-Null
          if ($err) { throw $err }
          [System.Management.Automation.PSParser]::Tokenize((Get-Content .\installer\uninstall-context-menu.ps1 -Raw), [ref]$err) | Out-Null
          if ($err) { throw $err }
      - name: Smoke test snapshot
        shell: pwsh
        run: |
          $sample = Join-Path $env:TEMP "dew-ci-sample"
          Remove-Item $sample -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $sample | Out-Null
          Set-Content -Path (Join-Path $sample "notes.txt") -Value "ci sample"
          python -m dew_encryption $sample
          Set-Content -Path (Join-Path $sample "notes.txt") -Value "ci sample changed"
          python -m dew_encryption watch $sample --once
          $history = python -m dew_encryption history (Join-Path $sample "Dew Encryption Archives\.dew-encryption-repo")
          if (-not $history) {
            throw "No history was produced."
          }
          $commit = ($history -split "`n")[0].Split("`t")[0]
          python -m dew_encryption details (Join-Path $sample "Dew Encryption Archives\.dew-encryption-repo") $commit
          $firstCommit = ($history -split "`n")[-1].Split("`t")[0]
          python -m dew_encryption restore (Join-Path $sample "Dew Encryption Archives\.dew-encryption-repo") $firstCommit $sample
          if ((Get-Content (Join-Path $sample "notes.txt") -Raw).Trim() -ne "ci sample") {
            throw "Restore did not return the folder to the first commit."
          }
          if (-not (Get-ChildItem (Join-Path $sample "Dew Encryption Archives") -Filter *.7z)) {
            throw "No archive was produced."
          }

  linux-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full python3-tk
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Compile package
        run: python -m compileall dew_encryption
      - name: Smoke test CLI history
        run: |
          sample="$(mktemp -d)"
          echo "linux sample" > "${sample}/notes.txt"
          python -m dew_encryption "${sample}"
          echo "linux sample changed" > "${sample}/notes.txt"
          python -m dew_encryption watch "${sample}" --once
          repo="${sample}/Dew Encryption Archives/.dew-encryption-repo"
          history="$(python -m dew_encryption history "${repo}")"
          test -n "${history}"
          commit="$(printf '%s\n' "${history}" | head -n 1 | cut -f1)"
          python -m dew_encryption details "${repo}" "${commit}"
          python -m dew_encryption veracrypt-encrypt --help
          python -m dew_encryption veracrypt-decrypt --help
          python -m dew_encryption veracrypt-settings --show
          python -m dew_encryption portable --show
      - name: Validate Linux integration files
        run: |
          bash -n linux/install.sh
          bash -n linux/uninstall.sh
          bash -n "linux/nautilus-scripts/dew encryption"
          bash -n "linux/nautilus-scripts/dew encryption start file history"
          bash -n "linux/nautilus-scripts/dew encryption file history manager"
          bash -n "linux/nautilus-scripts/dew encryption VeraCrypt encrypt"
          bash -n "linux/nautilus-scripts/dew encryption VeraCrypt decrypt"
