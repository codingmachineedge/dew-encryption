name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "8.0.x"
      - name: Build Windows installer
        shell: pwsh
        run: |
          choco install innosetup -y
          .\scripts\build-windows-installer.ps1
      - name: Create portable Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\DewEncryptionPortable\icons | Out-Null
          Copy-Item dist\app\dew-encryption.exe,dist\app\dew-encryption-gui.exe,dist\app\dew-encryption-python-gui.exe -Destination dist\DewEncryptionPortable
          Copy-Item assets\icons\*.ico,assets\icons\*.png -Destination dist\DewEncryptionPortable\icons
          New-Item -ItemType Directory -Path dist\DewEncryptionPortable\installer | Out-Null
          Copy-Item installer\create-elevated-tasks.ps1,installer\remove-elevated-tasks.ps1,installer\launch-create-elevated-tasks.ps1,installer\launch-remove-elevated-tasks.ps1 -Destination dist\DewEncryptionPortable\installer
          Copy-Item README.md,LICENSE -Destination dist\DewEncryptionPortable
          Set-Content -Path dist\DewEncryptionPortable\portable.flag -Value "portable"
          Compress-Archive -Path dist\DewEncryptionPortable\* -DestinationPath dist\DewEncryptionPortable.zip -Force
      - name: Create install bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\dew-encryption | Out-Null
          Copy-Item dew_encryption,installer,docs,linux,assets,scripts -Destination dist\dew-encryption -Recurse
          Copy-Item README.md,LICENSE,pyproject.toml -Destination dist\dew-encryption
          Compress-Archive -Path dist\dew-encryption\* -DestinationPath dist\dew-encryption.zip -Force
      - name: Prepare GitHub release assets
        id: release
        shell: pwsh
        run: |
          $assets = @(
            "dist\installer\DewEncryptionSetup.exe",
            "dist\DewEncryptionPortable.zip",
            "dist\dew-encryption.zip",
            "dist\context-menu\DewEncryptionExplorerCommand.dll",
            "dist\context-menu\DewEncryption.ContextMenu.msix"
          )

          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset -PathType Leaf)) {
              throw "Expected release asset was not created: $asset"
            }
            if ((Get-Item -LiteralPath $asset).Length -eq 0) {
              throw "Release asset is empty: $asset"
            }
          }

          $checksumLines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $([IO.Path]::GetFileName($asset))"
          }
          [IO.File]::WriteAllText(
            (Join-Path $PWD "dist\SHA256SUMS.txt"),
            ($checksumLines -join "`n") + "`n",
            [Text.Encoding]::ASCII
          )

          if ($env:GITHUB_REF_TYPE -eq "tag") {
            "tag=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
            "title=Dew Encryption $env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
            "prerelease=false" >> $env:GITHUB_OUTPUT
          }
          else {
            $shortSha = $env:GITHUB_SHA.Substring(0, 12)
            "tag=manual-$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT-$shortSha" >> $env:GITHUB_OUTPUT
            "title=Manual build #$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT ($shortSha)" >> $env:GITHUB_OUTPUT
            "prerelease=true" >> $env:GITHUB_OUTPUT
          }

      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
          IS_PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          $releaseAssets = @(
            "dist\installer\DewEncryptionSetup.exe",
            "dist\DewEncryptionPortable.zip",
            "dist\dew-encryption.zip",
            "dist\context-menu\DewEncryptionExplorerCommand.dll",
            "dist\context-menu\DewEncryption.ContextMenu.msix",
            "dist\SHA256SUMS.txt"
          )

          $notes = @"
          Windows installer, portable package, and source install bundle for commit $env:GITHUB_SHA.

          Verify downloads with SHA256SUMS.txt.
          "@

          $ghArguments = @(
            "release", "create", $env:RELEASE_TAG
          ) + $releaseAssets + @(
            "--repo", $env:GITHUB_REPOSITORY,
            "--target", $env:GITHUB_SHA,
            "--title", $env:RELEASE_TITLE,
            "--notes", $notes,
            "--draft=false"
          )

          if ($env:IS_PRERELEASE -eq "true") {
            $ghArguments += @("--prerelease", "--latest=false")
          }
          else {
            $ghArguments += "--verify-tag"
          }

          & gh @ghArguments
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release publishing failed with exit code $LASTEXITCODE."
          }
