name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create install bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\dew-encryption | Out-Null
          Copy-Item dew_encryption,installer,docs -Destination dist\dew-encryption -Recurse
          Copy-Item README.md,LICENSE,pyproject.toml -Destination dist\dew-encryption
          Compress-Archive -Path dist\dew-encryption\* -DestinationPath dist\dew-encryption.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: dew-encryption
          path: dist/dew-encryption.zip
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dew-encryption.zip
