name: Publish Windows Installer Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "8.0.x"

      - name: Build Windows installer
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          .\scripts\build-windows-installer.ps1

      - name: Validate and prepare installer
        id: publish
        shell: pwsh
        run: |
          $expectedFiles = @(
            "dist\app\dew-encryption.exe",
            "dist\app\dew-encryption-gui.exe",
            "dist\app\dew-encryption-python-gui.exe",
            "dist\csharp-gui\DewEncryption.Gui.exe",
            "dist\context-menu\DewEncryptionExplorerCommand.dll",
            "dist\context-menu\DewEncryption.ContextMenu.msix",
            "dist\installer\DewEncryptionSetup.exe"
          )

          foreach ($path in $expectedFiles) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Expected build output was not created: $path"
            }
            if ((Get-Item -LiteralPath $path).Length -eq 0) {
              throw "Build output is empty: $path"
            }
          }

          & .\dist\app\dew-encryption.exe --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Packaged CLI smoke test failed with exit code $LASTEXITCODE."
          }

          $installedGuiHash = (Get-FileHash -LiteralPath .\dist\app\dew-encryption-gui.exe -Algorithm SHA256).Hash
          $publishedGuiHash = (Get-FileHash -LiteralPath .\dist\csharp-gui\DewEncryption.Gui.exe -Algorithm SHA256).Hash
          if ($installedGuiHash -ne $publishedGuiHash) {
            throw "The default GUI is not the published C# Avalonia executable."
          }

          $guiProcess = Start-Process -FilePath .\dist\app\dew-encryption-gui.exe -ArgumentList "--minimized" -WindowStyle Hidden -PassThru
          try {
            Start-Sleep -Seconds 5
            if ($guiProcess.HasExited) {
              throw "Packaged C# GUI exited during its launch smoke test with code $($guiProcess.ExitCode)."
            }
          }
          finally {
            if (-not $guiProcess.HasExited) {
              Stop-Process -Id $guiProcess.Id -Force
            }
          }

          $shortSha = $env:GITHUB_SHA.Substring(0, 12)
          $assetName = "DewEncryptionSetup-$shortSha.exe"
          $releaseTag = "build-$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT-$shortSha"
          $releaseTitle = "Continuous build #$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT ($shortSha)"
          $publishDirectory = (New-Item -ItemType Directory -Path dist\publish -Force).FullName
          $assetPath = Join-Path $publishDirectory $assetName

          Copy-Item -LiteralPath dist\installer\DewEncryptionSetup.exe -Destination $assetPath
          $hash = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
            "$assetPath.sha256",
            "$hash  $assetName`n",
            [Text.Encoding]::ASCII
          )

          "asset_path=dist/publish/$assetName" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_title=$releaseTitle" >> $env:GITHUB_OUTPUT

      - name: Publish installer release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_PATH: ${{ steps.publish.outputs.asset_path }}
          RELEASE_TAG: ${{ steps.publish.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.publish.outputs.release_title }}
        run: |
          $notes = @"
          Automated Windows installer for commit $env:GITHUB_SHA.

          Source branch: $env:GITHUB_REF_NAME
          "@

          gh release create $env:RELEASE_TAG `
            $env:ASSET_PATH `
            "$env:ASSET_PATH.sha256" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title $env:RELEASE_TITLE `
            --notes $notes `
            --draft=false `
            --prerelease `
            --latest=false
